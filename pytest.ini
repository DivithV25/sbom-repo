[pytest]
# Pytest configuration for PRISM test suites

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    -ra
    --color=yes

# Markers for categorizing tests
markers =
    objective1: Tests for Objective 1 (Multi-feed correlation)
    objective2: Tests for Objective 2 (Reachability & AI)
    benchmarking: Benchmarking tests comparing with other tools
    ablation: Ablation study tests
    metrics: Metric generation tests
    integration: Integration tests
    performance: Performance and scalability tests
    accuracy: Accuracy validation tests
    slow: Tests that take longer to run
    requires_api: Tests requiring external API access

# Test paths
testpaths = tests

# Console output format
console_output_style = progress

# Minimum version
minversion = 7.0

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage (if pytest-cov is installed)
# addopts = --cov=agent --cov-report=html --cov-report=term

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
