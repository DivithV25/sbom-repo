name: PRISM Auto Dependency Fix

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  prism-fix:
    if: >-
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/prism-fix')
    runs-on: ubuntu-latest

    steps:
      - name: Validate actor and parse command
        id: parse
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = (context.payload.comment.body || '').trim();
            const match = body.match(/^\/prism-fix(?:\s+(.+))?$/);
            if (!match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '⚠️ Usage: `/prism-fix` or `/prism-fix <package1> <package2> ...`'
              });
              core.setFailed('Invalid command format');
              return;
            }

            const association = context.payload.comment.author_association || 'NONE';
            const allowed = ['OWNER', 'MEMBER', 'COLLABORATOR'];
            if (!allowed.includes(association)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `⛔ \`${association}\` users cannot run /prism-fix. Allowed: OWNER, MEMBER, COLLABORATOR.`
              });
              core.setFailed('Untrusted actor');
              return;
            }

            const rawArgs = (match[1] || '').trim();
            const requested = rawArgs
              ? Array.from(new Set(rawArgs.split(/\s+/).filter(Boolean)))
              : [];

            core.setOutput('mode', requested.length === 0 ? 'all' : 'selected');
            core.setOutput('requested_json', JSON.stringify(requested));
            core.info(`Mode: ${requested.length === 0 ? 'all' : 'selected'}`);
            core.info(`Requested: ${requested.length ? requested.join(', ') : '(all recommended packages)'}`);

      - name: Get PR metadata and resolve package targets
        id: pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const requested = JSON.parse(`${{ steps.parse.outputs.requested_json }}` || '[]');

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            core.setOutput('head_ref', pr.data.head.ref);
            core.setOutput('head_sha', pr.data.head.sha);
            core.setOutput('head_repo', pr.data.head.repo.full_name);
            core.setOutput('is_fork', String(pr.data.head.repo.fork));
            core.setOutput('maintainer_can_modify', String(Boolean(pr.data.maintainer_can_modify)));

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const changedFilesResp = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });
            const changedFiles = changedFilesResp.data || [];

            // Build latest recommendation map from existing PRISM comments.
            // Pattern: Upgrade `pkg` from `x` to `y`
            const recMap = {};
            const recRegex = /Upgrade\s+`([^`]+)`\s+from\s+`([^`]+)`\s+to\s+`([^`]+)`/g;

            for (const comment of comments.data) {
              const body = comment.body || '';
              let m;
              while ((m = recRegex.exec(body)) !== null) {
                const pkg = m[1];
                const fromVersion = m[2];
                const toVersion = m[3];
                recMap[pkg] = { fromVersion, toVersion };
              }
            }

            const allRecommended = Object.keys(recMap);
            if (allRecommended.length === 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '⚠️ Could not find any PRISM upgrade recommendations in current PR comments.'
              });
              core.setFailed('No recommendations found in PR comments');
              return;
            }

            const selectedPackages = requested.length ? requested : allRecommended;
            const missingPackages = selectedPackages.filter(p => !recMap[p]);
            if (missingPackages.length === selectedPackages.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `⚠️ No matching PRISM recommendations found for: ${missingPackages.map(p => `\\`${p}\\``).join(', ')}`
              });
              core.setFailed('Requested packages are not in recommendation set');
              return;
            }

            const supportedFiles = ['package.json', 'requirements.txt', 'pom.xml', 'go.mod'];
            function inferEcosystem(fileName) {
              if (fileName.endsWith('package.json')) return 'npm';
              if (fileName.endsWith('requirements.txt')) return 'pypi';
              if (fileName.endsWith('pom.xml')) return 'maven';
              if (fileName.endsWith('go.mod')) return 'go';
              return 'unknown';
            }

            function findTargetFile(pkg, fromVersion) {
              for (const manifest of supportedFiles) {
                const file = changedFiles.find(f => {
                  const fileName = f.filename || '';
                  if (!fileName.endsWith(manifest)) return false;
                  const patch = f.patch || '';
                  return patch.includes(pkg) || (fromVersion && patch.includes(fromVersion));
                });
                if (file) return file.filename;
              }
              return '';
            }

            const targets = [];
            const unresolved = [];

            for (const pkg of selectedPackages) {
              const rec = recMap[pkg];
              if (!rec) {
                unresolved.push(pkg);
                continue;
              }

              const targetFile = findTargetFile(pkg, rec.fromVersion);
              if (!targetFile) {
                unresolved.push(pkg);
                continue;
              }

              targets.push({
                package: pkg,
                fromVersion: rec.fromVersion,
                toVersion: rec.toVersion,
                targetFile,
                ecosystem: inferEcosystem(targetFile),
              });
            }

            if (targets.length === 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `⚠️ No supported target files found for requested packages. Supported manifests: ${supportedFiles.join(', ')}`
              });
              core.setFailed('No package targets resolved');
              return;
            }

            core.setOutput('targets_json', JSON.stringify(targets));
            core.setOutput('resolved_packages', targets.map(t => t.package).join(','));
            core.setOutput('unresolved_packages', unresolved.join(','));
            core.info(`Resolved targets: ${targets.map(t => `${t.package}(${t.targetFile})`).join(', ')}`);
            if (unresolved.length) {
              core.info(`Unresolved packages: ${unresolved.join(', ')}`);
            }

      - name: Stop early for unsupported fork branch push
        if: >-
          steps.pr.outputs.is_fork == 'true' &&
          steps.pr.outputs.maintainer_can_modify != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const resolved = `${{ steps.pr.outputs.resolved_packages }}`.split(',').filter(Boolean);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `⚠️ Cannot auto-commit /prism-fix for ${resolved.map(p => `\\`${p}\\``).join(', ')} because this PR is from a fork without maintainer edit access. Apply inline suggestions manually.`
            });

      - name: Checkout PR head
        if: >-
          !(steps.pr.outputs.is_fork == 'true' &&
            steps.pr.outputs.maintainer_can_modify != 'true')
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr.outputs.head_repo }}
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0

      - name: Apply dependency fixes
        if: >-
          !(steps.pr.outputs.is_fork == 'true' &&
            steps.pr.outputs.maintainer_can_modify != 'true')
        id: apply
        uses: actions/github-script@v7
        env:
          TARGETS_JSON: ${{ steps.pr.outputs.targets_json }}
        with:
          script: |
            const fs = require('fs');
            const targets = JSON.parse(process.env.TARGETS_JSON || '[]');

            function escapeRegExp(s) {
              return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }

            function applyNpm(file, pkgName, fromVersion, toVersion) {
              const doc = JSON.parse(fs.readFileSync(file, 'utf8'));
              const scopes = ['dependencies', 'devDependencies', 'optionalDependencies', 'peerDependencies'];
              let previous = '';
              let changed = false;

              for (const scope of scopes) {
                const block = doc[scope];
                if (!block || typeof block !== 'object') continue;
                if (!Object.prototype.hasOwnProperty.call(block, pkgName)) continue;

                previous = String(block[pkgName]);
                if (fromVersion && previous !== fromVersion) {
                  throw new Error(`Current version mismatch for ${pkgName}: expected ${fromVersion}, found ${previous}`);
                }
                if (previous !== toVersion) {
                  block[pkgName] = toVersion;
                  changed = true;
                }
                break;
              }

              if (!previous) {
                throw new Error(`Package ${pkgName} not found in ${file}`);
              }

              fs.writeFileSync(file, `${JSON.stringify(doc, null, 2)}\n`, 'utf8');
              return { previous, changed };
            }

            function applyPyPi(file, pkgName, fromVersion, toVersion) {
              const original = fs.readFileSync(file, 'utf8');
              const lines = original.split(/\r?\n/);
              const namePattern = escapeRegExp(pkgName);
              const reqRegex = new RegExp(`^\\s*${namePattern}(\\[[^\\]]+\\])?\\s*(==|>=|<=|~=|!=|>|<)\\s*([^\\s#]+)(.*)$`, 'i');
              const exactRegex = new RegExp(`^\\s*${namePattern}(\\[[^\\]]+\\])?\\s*$`, 'i');

              let previous = '';
              let changed = false;

              for (let i = 0; i < lines.length; i += 1) {
                const line = lines[i];
                if (!line || line.trim().startsWith('#')) continue;

                const m = line.match(reqRegex);
                if (m) {
                  previous = m[3];
                  if (fromVersion && previous !== fromVersion) {
                    throw new Error(`Current version mismatch for ${pkgName}: expected ${fromVersion}, found ${previous}`);
                  }
                  const newLine = line.replace(reqRegex, `${pkgName}$1==${toVersion}$4`);
                  if (newLine !== line) {
                    lines[i] = newLine;
                    changed = true;
                  }
                  break;
                }

                if (line.match(exactRegex)) {
                  previous = '(unpinned)';
                  lines[i] = `${pkgName}==${toVersion}`;
                  changed = true;
                  break;
                }
              }

              if (!previous && !changed) {
                throw new Error(`Package ${pkgName} not found in ${file}`);
              }

              fs.writeFileSync(file, `${lines.join('\n').replace(/\n+$/, '')}\n`, 'utf8');
              return { previous, changed };
            }

            function applyGo(file, pkgName, fromVersion, toVersion) {
              const original = fs.readFileSync(file, 'utf8');
              const lines = original.split(/\r?\n/);
              const namePattern = escapeRegExp(pkgName);
              const goRegex = new RegExp(`^(\\s*)${namePattern}(\\s+)v?([^\\s]+)(\\s*.*)$`);

              let previous = '';
              let changed = false;

              for (let i = 0; i < lines.length; i += 1) {
                const line = lines[i];
                const m = line.match(goRegex);
                if (!m) continue;

                previous = m[3];
                if (fromVersion && previous !== fromVersion) {
                  throw new Error(`Current version mismatch for ${pkgName}: expected ${fromVersion}, found ${previous}`);
                }

                const newLine = `${m[1]}${pkgName}${m[2]}v${toVersion}${m[4]}`;
                if (newLine !== line) {
                  lines[i] = newLine;
                  changed = true;
                }
                break;
              }

              if (!previous) {
                throw new Error(`Module ${pkgName} not found in ${file}`);
              }

              fs.writeFileSync(file, `${lines.join('\n').replace(/\n+$/, '')}\n`, 'utf8');
              return { previous, changed };
            }

            function applyMaven(file, pkgName, fromVersion, toVersion) {
              const xml = fs.readFileSync(file, 'utf8');
              const parts = pkgName.split(':');
              if (parts.length !== 2) {
                throw new Error(`Maven package must be groupId:artifactId. Got ${pkgName}`);
              }

              const groupId = parts[0];
              const artifactId = parts[1];
              const blockRegex = new RegExp(
                `<dependency>[\\s\\S]*?<groupId>${escapeRegExp(groupId)}<\\/groupId>[\\s\\S]*?<artifactId>${escapeRegExp(artifactId)}<\\/artifactId>[\\s\\S]*?<version>([^<]+)<\\/version>[\\s\\S]*?<\\/dependency>`,
                'm'
              );

              const m = xml.match(blockRegex);
              if (!m) {
                throw new Error(`Dependency ${pkgName} with explicit <version> not found in ${file}`);
              }

              const previous = m[1].trim();
              if (fromVersion && previous !== fromVersion) {
                throw new Error(`Current version mismatch for ${pkgName}: expected ${fromVersion}, found ${previous}`);
              }

              const updated = xml.replace(blockRegex, (block) =>
                block.replace(/<version>[^<]+<\/version>/, `<version>${toVersion}</version>`)
              );
              const changed = updated !== xml;
              fs.writeFileSync(file, updated, 'utf8');
              return { previous, changed };
            }

            const changedFiles = new Set();
            const changedPackages = [];
            const unchangedPackages = [];

            for (const target of targets) {
              const pkgName = target.package;
              const fromVersion = target.fromVersion || '';
              const toVersion = target.toVersion;
              const file = target.targetFile;
              const ecosystem = target.ecosystem;

              if (!fs.existsSync(file)) {
                throw new Error(`${file} not found in PR branch`);
              }

              let result;
              if (ecosystem === 'npm') {
                result = applyNpm(file, pkgName, fromVersion, toVersion);
              } else if (ecosystem === 'pypi') {
                result = applyPyPi(file, pkgName, fromVersion, toVersion);
              } else if (ecosystem === 'go') {
                result = applyGo(file, pkgName, fromVersion, toVersion);
              } else if (ecosystem === 'maven') {
                result = applyMaven(file, pkgName, fromVersion, toVersion);
              } else {
                throw new Error(`Unsupported ecosystem ${ecosystem} for ${pkgName}`);
              }

              if (result.changed) {
                changedFiles.add(file);
                changedPackages.push(pkgName);
                core.info(`Updated ${pkgName}: ${result.previous} -> ${toVersion} in ${file}`);
              } else {
                unchangedPackages.push(pkgName);
                core.info(`${pkgName} already at ${toVersion} in ${file}`);
              }
            }

            core.setOutput('changed', String(changedPackages.length > 0));
            core.setOutput('changed_files', JSON.stringify(Array.from(changedFiles)));
            core.setOutput('changed_packages', JSON.stringify(changedPackages));
            core.setOutput('unchanged_packages', JSON.stringify(unchangedPackages));

      - name: Commit and push
        if: >-
          !(steps.pr.outputs.is_fork == 'true' &&
            steps.pr.outputs.maintainer_can_modify != 'true') &&
          steps.apply.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(security): apply /prism-fix recommendations [PRISM]"
          git push origin "HEAD:${{ steps.pr.outputs.head_ref }}"

      - name: Comment result
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const skippedFork = `${{ steps.pr.outputs.is_fork }}` === 'true' && `${{ steps.pr.outputs.maintainer_can_modify }}` !== 'true';
            const changed = `${{ steps.apply.outputs.changed || '' }}` === 'true';
            const resolved = `${{ steps.pr.outputs.resolved_packages || '' }}`.split(',').filter(Boolean);
            const unresolved = `${{ steps.pr.outputs.unresolved_packages || '' }}`.split(',').filter(Boolean);
            const changedPackages = JSON.parse(`${{ steps.apply.outputs.changed_packages || '[]' }}`);
            const unchangedPackages = JSON.parse(`${{ steps.apply.outputs.unchanged_packages || '[]' }}`);

            let body;
            if (skippedFork) {
              body = `ℹ️ /prism-fix was not applied due to fork write restrictions. Requested/resolved packages: ${resolved.map(p => `\\`${p}\\``).join(', ') || 'none'}.`;
            } else if (changed) {
              body = `✅ Applied /prism-fix and pushed a commit. Updated: ${changedPackages.map(p => `\\`${p}\\``).join(', ')}.`;
              if (unchangedPackages.length) {
                body += ` Already up to date: ${unchangedPackages.map(p => `\\`${p}\\``).join(', ')}.`;
              }
            } else {
              body = `ℹ️ No dependency changes were needed. Requested/resolved packages: ${resolved.map(p => `\\`${p}\\``).join(', ') || 'none'}.`;
            }

            if (unresolved.length) {
              body += ` Could not resolve target file for: ${unresolved.map(p => `\\`${p}\\``).join(', ')}.`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
