name: Enforce Branch Protection Rules

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

jobs:
  enforce-protection:
    runs-on: ubuntu-latest
    name: Apply Branch Protection Rules
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Branch Protection for Main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "🔐 Configuring branch protection rules for main branch..."
          
          # Get the branch protection configuration
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/branches/main/protection")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          echo "Current status code: $HTTP_CODE"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ℹ️ Branch protection not yet configured (status: $HTTP_CODE)"
          else
            echo "✅ Branch protection already configured"
            echo "$BODY" | jq '.'
          fi

      - name: Apply/Update Branch Protection Rules
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "📋 Applying branch protection rules..."
          
          # Branch protection configuration
          PROTECTION_CONFIG=$(cat <<'EOF'
          {
            "required_status_checks": {
              "strict": true,
              "contexts": [
                "Generate SBOM on PR / SBOM Generation & Vulnerability Scan"
              ]
            },
            "enforce_admins": false,
            "required_pull_request_reviews": {
              "required_approving_review_count": 1,
              "dismiss_stale_reviews": true,
              "require_code_owner_reviews": false
            },
            "restrictions": null,
            "allow_force_pushes": false,
            "allow_deletions": false,
            "block_creations": false,
            "required_linear_history": false,
            "required_conversation_resolution": false
          }
          EOF
          )
          
          echo "Applying configuration..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/branches/main/protection" \
            -d "$PROTECTION_CONFIG")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          echo "Response status code: $HTTP_CODE"
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Branch protection rules successfully applied!"
            echo "$BODY" | jq '.' || echo "$BODY"
          elif [ "$HTTP_CODE" = "201" ]; then
            echo "✅ Branch protection rules successfully created!"
            echo "$BODY" | jq '.' || echo "$BODY"
          else
            echo "⚠️ Status code: $HTTP_CODE"
            echo "Response:"
            echo "$BODY" | jq '.' || echo "$BODY"
            
            if echo "$BODY" | grep -q "API rate limit exceeded"; then
              echo "❌ GitHub API rate limit exceeded. Please try again later."
              exit 1
            elif echo "$BODY" | grep -q "Not Found"; then
              echo "❌ Repository not found or token doesn't have access."
              exit 1
            elif echo "$BODY" | grep -q "Validation Failed"; then
              echo "⚠️ Validation error - this may be expected if rules are already set."
            else
              echo "❌ Failed to apply branch protection rules"
              exit 1
            fi
          fi

      - name: Verify Branch Protection
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "🔍 Verifying branch protection configuration..."
          
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/branches/main/protection")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Branch protection is active!"
            echo ""
            echo "Configuration Details:"
            echo "$BODY" | jq '{
              required_status_checks: .required_status_checks,
              enforce_admins: .enforce_admins,
              required_pull_request_reviews: .required_pull_request_reviews,
              allow_force_pushes: .allow_force_pushes,
              allow_deletions: .allow_deletions
            }' || echo "$BODY"
            
            # Check if PRISM security check is configured
            if echo "$BODY" | jq -e '.required_status_checks.contexts[] | select(. == "Generate SBOM on PR / SBOM Generation & Vulnerability Scan")' > /dev/null 2>&1; then
              echo ""
              echo "🔒 PRISM Security Scan is configured as REQUIRED check"
              echo "   → PRs with security failures CANNOT be merged"
            fi
          else
            echo "⚠️ Could not verify branch protection (status: $HTTP_CODE)"
          fi

      - name: Summary
        run: |
          echo "📊 Branch Protection Setup Summary"
          echo "===================================="
          echo ""
          echo "Branch: main"
          echo "Required Checks: Generate SBOM on PR / SBOM Generation & Vulnerability Scan"
          echo "Enforce For Admins: ✗ (Admins can bypass if needed)"
          echo "Require PR Reviews: ✓ (1 approval required)"
          echo "Dismiss Stale Reviews: ✓ (New commits dismiss old approvals)"
          echo "Allow Force Pushes: ✗ (Disabled)"
          echo "Allow Deletions: ✗ (Disabled)"
          echo ""
          echo "🔒 Security Impact:"
          echo "   • PRs with FAIL decision will have failing security checks"
          echo "   • Merge button will be disabled until check passes"
          echo "   • Developers must fix vulnerabilities to unblock merge"
          echo ""
          echo "✅ Setup Complete!"
