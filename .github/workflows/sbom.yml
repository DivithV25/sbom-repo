name: Generate SBOM on PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  generate-sbom:
    runs-on: ubuntu-latest
    name: Generate SBOM (Syft)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node (for npm projects; remove for other ecosystems)
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies (npm ci)
        if: always()
        run: |
          # Only do this if your project has a lockfile and requires install:
          if [ -f package-lock.json ]; then npm ci; elif [ -f package.json ]; then npm install --no-audit --no-fund; fi

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        id: sbom
        with:
          format: cyclonedx-json
          output-file: sbom-pr-${{ github.event.pull_request.number }}.json
          upload-artifact: true
          upload-artifact-retention: 30
          artifact-name: sbom-pr-${{ github.event.pull_request.number }}

      - name: Get SBOM Statistics
        id: sbom-stats
        run: |
          SBOM_FILE="sbom-pr-${{ github.event.pull_request.number }}.json"
          if [ -f "$SBOM_FILE" ]; then
            COMPONENT_COUNT=$(jq '.components | length' "$SBOM_FILE" 2>/dev/null || echo "0")
            SBOM_VERSION=$(jq -r '.specVersion // "1.4"' "$SBOM_FILE" 2>/dev/null || echo "1.4")
            SERIAL=$(jq -r '.serialNumber // "N/A"' "$SBOM_FILE" 2>/dev/null || echo "N/A")
          else
            COMPONENT_COUNT="0"
            SBOM_VERSION="1.4"
            SERIAL="N/A"
          fi
          echo "component_count=$COMPONENT_COUNT" >> $GITHUB_OUTPUT
          echo "sbom_version=$SBOM_VERSION" >> $GITHUB_OUTPUT
          echo "serial=$SERIAL" >> $GITHUB_OUTPUT

      - name: Comment SBOM Summary on PR
        uses: actions/github-script@v7
        with:
          script: |
            const componentCount = '${{ steps.sbom-stats.outputs.component_count }}';
            const sbomVersion = '${{ steps.sbom-stats.outputs.sbom_version }}';
            const serial = '${{ steps.sbom-stats.outputs.serial }}';
            const prNumber = context.payload.pull_request.number;
            const runId = context.runId;
            const repo = context.repo;
            
            const comment = `## 📦 SBOM Generated Successfully
            
            | Property | Value |
            |----------|-------|
            | **Format** | CycloneDX ${sbomVersion} |
            | **Components Detected** | ${componentCount} |
            | **Artifact Name** | \`sbom-pr-${prNumber}.json\` |
            | **Serial Number** | \`${serial}\` |
            
            ### 📥 Download Artifact
            The SBOM artifact is available in the [Actions Run](https://github.com/${repo.owner}/${repo.repo}/actions/runs/${runId}).
            
            ---
            <sub>🔒 Generated by <b>PRISM</b> - Pull-Request Integrated Security Mechanism</sub>`;
            
            // Find existing PRISM comment to update (avoid spam)
            const { data: comments } = await github.rest.issues.listComments({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: prNumber
            });
            
            const existingComment = comments.find(c => c.body.includes('SBOM Generated Successfully') && c.body.includes('PRISM'));
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: repo.owner,
                repo: repo.repo,
                comment_id: existingComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: prNumber,
                body: comment
              });
            }
