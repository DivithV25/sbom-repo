name: Generate SBOM on PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    name: SBOM Generation & Vulnerability Scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node (for npm projects; remove for other ecosystems)
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies (npm ci)
        if: always()
        run: |
          # Only do this if your project has a lockfile and requires install:
          if [ -f package-lock.json ]; then npm ci; elif [ -f package.json ]; then npm install --no-audit --no-fund; fi

      - name: Generate SBOM and upload artifact (Anchore sbom-action)
        uses: anchore/sbom-action@v0
        with:
          # Choose format: spdx-json, cyclonedx-json, syft-json, etc.
          format: cyclonedx-json
          output-file: sbom.json
          # target defaults to workspace; you can set TARGET to a path or image
          # target: .

      - name: Set up Python for vulnerability scanning
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Download Previous SBOM (for diff comparison)
        id: download-previous
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: sbom-main
          path: previous-sbom/

      - name: Run Enhanced Vulnerability Scanner
        id: vuln-scan
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "🔍 Running enhanced PRISM security scan..."

          # Build command with all enhancements
          CMD="python -m agent.main sbom.json --output vulnscan-output --log-dashboard --enable-updates"

          # Add previous SBOM for diff if available
          if [ -f previous-sbom/sbom.json ]; then
            echo "📊 Previous SBOM found - enabling diff analysis"
            CMD="$CMD --previous-sbom previous-sbom/sbom.json"
          fi

          # Run the scan
          $CMD

          echo "scan_complete=true" >> $GITHUB_OUTPUT

      - name: Display Vulnerability Report
        if: always()
        run: |
          echo "========================================="
          echo "🔐 PRISM SECURITY SCAN RESULTS"
          echo "========================================="
          if [ -f vulnscan-output/pr_comment.md ]; then
            cat vulnscan-output/pr_comment.md
          else
            echo "⚠️ No report generated"
          fi
          echo "========================================="

      - name: Upload SBOM Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-pr-${{ github.event.pull_request.number }}
          path: sbom.json

      - name: Upload Vulnerability Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-report-pr-${{ github.event.pull_request.number }}
          path: vulnscan-output/

      - name: Upload Dashboard Data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-data
          path: dashboard_data/
          retention-days: 30

      - name: Post PR Comment with Results
        if: always() && github.event.pull_request.number
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let comment = '';

            if (fs.existsSync('vulnscan-output/pr_comment.md')) {
              comment = fs.readFileSync('vulnscan-output/pr_comment.md', 'utf8');
            } else {
              comment = '## 🔐 PRISM Security Scan Results\n\n⚠️ Scan failed to complete. Check the workflow logs.';
            }

            // Post comment
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
